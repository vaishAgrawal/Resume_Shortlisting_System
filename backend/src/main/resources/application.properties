# ==============================
# SERVER
# ==============================

server.port=${SERVER_PORT:8080}

# ==============================
# DATABASE
# ==============================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

# ==============================
# JPA / Hibernate
# ==============================

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==============================
# FILE UPLOAD
# ==============================

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true

file.upload-dir=${FILE_UPLOAD_DIR}
file.allowed-types=${FILE_ALLOWED_TYPES}

# ==============================
# JWT
# ==============================

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# ==============================
# GEMINI AI
# ==============================

gemini.api.key=${GEMINI_API_KEY}

spring.autoconfigure.exclude=\
org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration,\
org.springframework.ai.model.google.genai.autoconfigure.GoogleGenAiAutoConfiguration

# ==============================
# LOGGING
# ==============================

logging.level.root=INFO
logging.level.com.resumeshortlist.resume_shortlist_backend=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.apache.tika=INFO
logging.level.com.google.genai=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

# ==============================
# EMAIL
# ==============================

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM}
support.email.receiver=${SUPPORT_EMAIL_RECEIVER}

# ==============================
# CORS
# ==============================

cors.allowed.origins=http://localhost:5173

# ==============================
# RAZORPAY
# ==============================

razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}